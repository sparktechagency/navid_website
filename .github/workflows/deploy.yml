name: Deploy Next.js Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22.13.0'

      # 3️⃣ Install dependencies & build on GitHub runner
      - name: Install Dependencies & Build
        run: |
          npm install --frozen-lockfile
          npm run build

      # 4️⃣ Configure SSH
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      # 5️⃣ Sync files + node_modules to EC2 (no npm install on server at all)
      - name: Sync Files to EC2
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e

          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "mkdir -p ~/applications/website"

          # Sync everything including node_modules — npm install never runs on server
          rsync -avz --delete --compress-level=9 \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            .next node_modules package.json package-lock.json public \
            $SERVER_USER@$SERVER_HOST:~/applications/website/

      # 6️⃣ Write .env file
      - name: Write Environment Variables
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          ENV_VARS_JSON: ${{ secrets.ENV_VARS_JSON }}
        run: |
          set -e

          echo "$ENV_VARS_JSON" | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > /tmp/.env

          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa \
            /tmp/.env $SERVER_USER@$SERVER_HOST:~/applications/website/.env

      # 7️⃣ Restart app only — no npm install on server
      - name: Restart App
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          set -e

          NVM_LOAD='export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"'

          # Ensure PM2 is installed
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "bash -c '$NVM_LOAD && (command -v pm2 > /dev/null 2>&1 || npm install -g pm2)'"

          # Delete & restart PM2 cleanly — no npm install, just restart
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "bash -c '$NVM_LOAD && cd ~/applications/website && \
              pm2 delete website 2>/dev/null || true && \
              pm2 start npm --name website -- start && \
              pm2 save'"
