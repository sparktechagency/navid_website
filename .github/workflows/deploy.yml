name: Deploy Next.js Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.17'

      # 3️⃣ Install dependencies & build
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build

      # 4️⃣ Setup SSH
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

      # 5️⃣ Deploy files to EC2
      - name: Deploy to EC2
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          ENV_VARS_JSON: ${{ secrets.ENV_VARS_JSON }}
        run: |
          set -e

          # nvm loader — sources nvm on the remote non-interactive shell
          NVM_LOAD='export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh" && [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"'

          # Ensure PM2 is installed
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "bash -c '$NVM_LOAD && (command -v pm2 > /dev/null 2>&1 || npm install -g pm2)'"

          # Create project directory if not exists
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "mkdir -p ~/applications/website"

          # Sync built files, package.json & package-lock.json to EC2
          rsync -avz --delete --compress-level=9 \
            -e "ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa" \
            .next package.json package-lock.json public \
            $SERVER_USER@$SERVER_HOST:~/applications/website/

          # Write environment variables from secret JSON
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "bash -c '$NVM_LOAD && echo '"'"'$ENV_VARS_JSON'"'"' | jq -r '"'"'to_entries | .[] | \"\(.key)=\(.value)\"'"'"' > ~/applications/website/.env'"

          # Install production dependencies only
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "bash -c '$NVM_LOAD && cd ~/applications/website && npm ci --omit=dev'"

          # Reload PM2 if already running, otherwise start fresh
          ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST \
            "bash -c '$NVM_LOAD && cd ~/applications/website && \
              (pm2 describe website > /dev/null 2>&1 \
                && pm2 reload website --update-env \
                || pm2 start npm --name website -- start) \
              && pm2 save'"
