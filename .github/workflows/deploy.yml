name: Deploy Next.js Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repo
        uses: actions/checkout@v3

      # 2️⃣ Optional Node setup on runner
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22 # only for local checks; server build will use Node 24

      # 3️⃣ Configure SSH
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts

      # 4️⃣ Deploy to EC2
      - name: Deploy to EC2
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          ENV_VARS_JSON: ${{ secrets.ENV_VARS_JSON }}
        run: |
          set -e

          echo "🚀 Connecting to server..."

          # Create app directory if not exists
          ssh $SERVER_USER@$SERVER_HOST "mkdir -p ~/applications/website"

          # Sync project files (excluding node_modules & .next)
          rsync -avz --delete \
            --exclude node_modules \
            --exclude .next \
            ./ $SERVER_USER@$SERVER_HOST:~/applications/website/

          echo "📦 Files synced successfully"

          # Run setup + build + restart on server
          ssh $SERVER_USER@$SERVER_HOST "
            set -e

            # ✅ Load NVM and use Node 24
            export NVM_DIR=\"$HOME/.nvm\"
            [ -s \"$NVM_DIR/nvm.sh\" ] && \. \"$NVM_DIR/nvm.sh\"
            nvm use 24

            cd ~/applications/website

            echo '📁 Writing environment variables'
            echo '$ENV_VARS_JSON' | jq -r 'to_entries | .[] | \"\(.key)=\(.value)\"' > .env

            echo '📦 Installing dependencies'
            npm install --no-audit --prefer-offline

            echo '🏗 Building Next.js app'
            npm run build

            echo '♻ Restarting PM2'
            pm2 describe website > /dev/null 2>&1 && pm2 reload website || pm2 start npm --name website -- start

            pm2 save
          "

          echo "✅ Deployment completed successfully!"
